<!doctype html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>V104.6 Google Sheets 同步版設定教學</title>
<style>
*{box-sizing:border-box}body{margin:0;background:#eef2f6;color:#1f2937;font-family:'Microsoft JhengHei',Arial,sans-serif;line-height:1.75}.wrap{max-width:1080px;margin:0 auto;padding:22px}.card{background:#fffdf7;border:1px solid #dde4dc;border-radius:18px;margin:14px 0;padding:18px;box-shadow:0 8px 24px rgba(15,23,42,.06)}h1,h2{line-height:1.25}h1{margin:0 0 8px;font-size:30px}h2{margin:4px 0 10px;font-size:22px}.sub{color:#64748b}.ok{color:#15803d;font-weight:900}.warn{color:#b45309;font-weight:900}.bad{color:#b91c1c;font-weight:900}pre{white-space:pre-wrap;background:#0f172a;color:#e5e7eb;padding:14px;border-radius:14px;overflow:auto;font-size:13px;line-height:1.55}code{background:#e2e8f0;border-radius:8px;padding:2px 6px}button{border:0;border-radius:999px;background:#2563eb;color:#fff;padding:10px 14px;font-weight:900;cursor:pointer}textarea{width:100%;min-height:150px;border:1px solid #cbd5e1;border-radius:14px;padding:12px;font-family:Consolas,monospace}input{width:100%;border:1px solid #cbd5e1;border-radius:12px;padding:10px;font-family:Consolas,monospace}.grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}@media(max-width:760px){.grid{grid-template-columns:1fr}}table{border-collapse:collapse;width:100%;font-size:14px}th,td{border-bottom:1px solid #e2e8d7;padding:8px;text-align:left;vertical-align:top}th{background:#eef1e6}.pill{display:inline-block;border-radius:999px;padding:3px 9px;background:#dbeafe;color:#1d4ed8;font-weight:900}
</style>
</head>
<body><div class="wrap">
<div class="card"><h1>V104.6 Google Sheets 同步版設定教學</h1><div class="sub">這版目標：Render 免費版只負責跑程式和顯示 dashboard，長期帳本放 Google Sheets。開網頁時先從 Sheets 抓 state，跑完再回存。</div></div>

<div class="card"><h2>一、先更新 GitHub / Render</h2>
<ol>
<li>下載新版 ZIP，解壓縮。</li>
<li>把解壓後資料夾內的所有檔案覆蓋到 GitHub repo。</li>
<li>GitHub 按 <b>Commit changes</b>。</li>
<li>Render 進服務頁，按 <b>Manual Deploy → Deploy latest commit</b>。</li>
</ol>
<p>這版新增 <code>v1046_gs_sync.py</code>、<code>GOOGLE_SHEETS_SETUP.html</code>，並更新 <code>requirements.txt</code>。</p></div>

<div class="card"><h2>二、建立 Google Sheet</h2>
<ol>
<li>到 Google Sheets 建一個空白試算表。</li>
<li>名字可以叫 <b>V1046 Cloud State</b>。</li>
<li>複製網址中 <code>/d/</code> 後面那串，就是 <b>Sheet ID</b>。</li>
</ol>
<pre>https://docs.google.com/spreadsheets/d/這一段就是 V1046_GOOGLE_SHEET_ID/edit</pre>
</div>

<div class="card"><h2>三、建立 Service Account JSON</h2>
<ol>
<li>到 Google Cloud Console 建立或選一個 project。</li>
<li>啟用 Google Sheets API。</li>
<li>建立 Service Account。</li>
<li>在 Service Account 的 Keys 新增 JSON key，下載 JSON。</li>
<li>打開 JSON，找到 <code>client_email</code>。</li>
<li>回 Google Sheet，按 Share，把 <code>client_email</code> 加進去，權限給 <b>Editor</b>。</li>
</ol>
<p class="bad">JSON key 是密碼等級，不要上傳到 GitHub，不要貼給別人。只放 Render Environment。</p>
</div>

<div class="card"><h2>四、把 JSON 轉成一行 base64</h2>
<p>Render 環境變數貼 raw JSON 有時候會因換行出錯。建議貼 base64。</p>
<textarea id="jsonInput" placeholder="把 service account JSON 全部貼在這裡"></textarea>
<p><button onclick="convertJson()">轉成 base64</button></p>
<input id="base64Output" placeholder="這裡會產生 V1046_GOOGLE_SERVICE_ACCOUNT_JSON 可貼的值" readonly>
<p class="sub">這個轉換只在你的瀏覽器本機執行，不會上傳。</p>
</div>

<div class="card"><h2>五、Render 環境變數</h2>
<p>到 Render 服務 → Environment，加入或修改：</p>
<pre>V1046_SHEETS_ENABLED=true
V1046_GOOGLE_SHEET_ID=你的 Google Sheet ID
V1046_GOOGLE_SERVICE_ACCOUNT_JSON=剛剛產生的 base64
V1046_SHEETS_STATE_ENABLED=true
V1046_SHEETS_OUTPUT_ENABLED=true
V1046_SHEETS_LOCK_ENABLED=true
V1046_SHEETS_LOCK_TTL_SECONDS=900</pre>
<p>原本這些照留：</p>
<pre>PYTHON_VERSION=3.11.9
TZ=Asia/Taipei
V1046_AUTO_RUN_ON_OPEN=true
V1046_AUTO_RUN_MODE=real
V1046_AUTO_OPEN_COOLDOWN_SECONDS=600</pre>
<p>存好後重新部署：<b>Manual Deploy → Deploy latest commit</b>。</p>
</div>

<div class="card"><h2>六、測試</h2>
<ol>
<li>先開 <code>/healthz</code>，確認 <span class="ok">ok:true</span>。</li>
<li>再開 <code>/sheets</code>，看 service account email 和設定狀態。</li>
<li>點 <code>/api/sheets/status?check=1</code>，如果 connect_ok=true 就成功。</li>
<li>最後開首頁 <code>/</code>，它會自動從 Sheets 抓 state，跑完再回存。</li>
</ol>
</div>

<div class="card"><h2>七、Google Sheets 會出現的分頁</h2>
<table><thead><tr><th>類型</th><th>分頁</th><th>用途</th></tr></thead><tbody>
<tr><td><span class="pill">state</span></td><td>state_positions</td><td>目前紙上 HOLD / SELL_DUE</td></tr>
<tr><td><span class="pill">state</span></td><td>state_closed_trades</td><td>已出場紀錄</td></tr>
<tr><td><span class="pill">state</span></td><td>state_equity_curve</td><td>權益曲線 / 監控摘要歷史</td></tr>
<tr><td><span class="pill">state</span></td><td>state_signal_ledger</td><td>每日訊號鎖定，防止同日重跑改推薦</td></tr>
<tr><td><span class="pill">output</span></td><td>output_today_recommendations</td><td>今日推薦完整表</td></tr>
<tr><td><span class="pill">output</span></td><td>output_monitor_summary</td><td>紙上監控摘要</td></tr>
<tr><td><span class="pill">output</span></td><td>output_risk_guard_status</td><td>風控狀態</td></tr>
<tr><td><span class="pill">system</span></td><td>_run_lock</td><td>避免同時兩次寫入</td></tr>
<tr><td><span class="pill">system</span></td><td>run_log</td><td>每次執行紀錄</td></tr>
</tbody></table>
</div>

<div class="card"><h2>八、重要觀念</h2>
<ul>
<li><b>state</b> 是帳本，會從 Google Sheets 讀寫，避免 Render 免費版重啟後丟資料。</li>
<li><b>output</b> 是表格報表，也會同步到 Google Sheets。</li>
<li><b>dashboard HTML</b> 不放 Google Sheets，仍由 Render 顯示。</li>
<li>第一次跑時，如果 Google Sheets 分頁是空的，程式會先用 GitHub 內的初始 CSV 種進 Sheets。</li>
</ul>
</div>
</div>
<script>
function convertJson(){
  const src=document.getElementById('jsonInput').value.trim();
  const out=document.getElementById('base64Output');
  try{
    const obj=JSON.parse(src);
    const normalized=JSON.stringify(obj);
    out.value=btoa(unescape(encodeURIComponent(normalized)));
  }catch(e){
    out.value='JSON 格式錯誤：'+e.message;
  }
}
</script>
</body></html>
